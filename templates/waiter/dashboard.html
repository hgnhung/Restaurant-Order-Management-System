<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waiter Dashboard</title>
    <style>
        /* CSS Reset and font optimization */
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f4f6f9; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; /* Prevents layout clipping on mobile/tablet browsers */
        }
        /* Dashboard container optimized for tablet screen visibility */
        .dashboard-container { 
            background: white; 
            padding: 50px 40px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            text-align: center; 
            max-width: 480px; 
            width: 100%; 
        }
        h1 { color: #2c3e50; margin: 0 0 10px 0; font-size: 28px; }
        p { color: #7f8c8d; margin: 0 0 40px 0; font-size: 16px; line-height: 1.5; }
        /* Larger touch targets for fast-paced service environments */
        .btn-menu { 
            display: block; 
            background-color: #3498db; 
            color: white; 
            text-decoration: none; 
            padding: 18px; 
            border-radius: 10px; 
            font-size: 18px; 
            font-weight: bold; 
            margin-bottom: 20px; 
            transition: all 0.2s ease; 
            box-shadow: 0 4px 6px rgba(52, 152, 219, 0.2);
        }
        .btn-menu:hover { background-color: #2980b9; transform: translateY(-1px); }
        .btn-menu:active { transform: translateY(1px); }
        /* Aligned logout button design with a subtle shadow */
        .btn-logout { 
            display: block; 
            background-color: #e74c3c; 
            color: white; 
            text-decoration: none; 
            padding: 15px; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: bold; 
            transition: all 0.2s ease; 
            box-shadow: 0 4px 6px rgba(231, 76, 60, 0.15);
        }
        .btn-logout:hover { background-color: #c0392b; transform: translateY(-1px); }
        .btn-logout:active { transform: translateY(1px); }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <h1>Hello, Waiter!</h1>
        <p>Welcome to the Tablet Order Management System</p>
        
        <!-- This link routes to the view_tables() function to display the table layout -->
        <a href="/waiter/tables" class="btn-menu">🪑 View Tables & Take Orders</a>
        
        <!-- Added a visual icon to match the menu button style -->
        <a href="/" class="btn-logout">🚪 Log Out</a>
    </div>
</body>
</html>
