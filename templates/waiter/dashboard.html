<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Waiter Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #333;
        }
        
        .dashboard-container { 
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            padding: 60px 50px; 
            border-radius: 24px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            text-align: center; 
            max-width: 500px; 
            width: 90%; 
            border: 1px solid rgba(255,255,255,0.4);
            animation: fadeIn 0.6s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .avatar-circle {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            border-radius: 50%;
            margin: 0 auto 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(0, 114, 255, 0.3);
        }

        h1 { margin: 0 0 10px 0; font-size: 32px; font-weight: 700; color: #1e293b; }
        p { color: #64748b; margin: 0 0 40px 0; font-size: 16px; line-height: 1.6; }
        
        .btn { 
            display: block; 
            text-decoration: none; 
            padding: 18px 24px; 
            border-radius: 14px; 
            font-size: 18px; 
            font-weight: 600; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 20px;
            border: none;
            cursor: pointer;
        }
        
        .btn-menu { 
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white; 
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
        }
        .btn-menu:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(37, 99, 235, 0.4); }
        .btn-menu:active { transform: translateY(1px); }
        
        .btn-logout { 
            background: white; 
            color: #ef4444; 
            border: 2px solid #fee2e2;
        }
        .btn-logout:hover { background: #fef2f2; transform: translateY(-3px); border-color: #fca5a5; }
        .btn-logout:active { transform: translateY(1px); }

        /* Notification Toast styles */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 9999;
        }
        .toast {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-left: 5px solid #10b981;
            padding: 15px 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: #0f172a;
            font-weight: 500;
        }
        .toast-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            font-size: 13px;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>

    <div class="dashboard-container">
        <div class="avatar-circle">
            {{ session.get('userID', 'W')[0] | upper }}
        </div>
        <h1>Hello, {{ session.get('userID', 'Waiter') }}</h1>
        <p>Welcome back to the Premium Order Management System. Have a great shift!</p>
        
        <a href="/waiter/tables" class="btn btn-menu">🪑 View Tables & Orders</a>
        <a href="/logout" class="btn btn-logout">🚪 Log Out</a>
    </div>

    <script>
        // Polling notifications
        const knownNotifications = new Set();
        async function fetchNotifications() {
            try {
                const res = await fetch('/waiter/api/notifications');
                const data = await res.json();
                if (data.success && data.notifications) {
                    data.notifications.forEach(n => {
                        if (!knownNotifications.has(n.OrderID)) {
                            knownNotifications.add(n.OrderID);
                            showToast(n);
                        }
                    });
                }
            } catch (e) { console.error("Error fetching notifications", e); }
        }

        function showToast(notification) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `
                <div>
                    <strong>Order Ready!</strong><br>
                    <small>Table ${notification.TableNumber} is ready to be served.</small>
                </div>
                <a href="/waiter/order-detail?table=${notification.TableNumber}" class="toast-btn">Serve Now</a>
            `;
            container.appendChild(toast);
        }

        setInterval(fetchNotifications, 5000); // Check every 5 seconds
        fetchNotifications(); // Initial check
    </script>
</body>
</html>
