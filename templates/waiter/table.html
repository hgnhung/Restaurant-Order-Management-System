<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sơ đồ bàn ăn - Phục vụ</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ddd; padding-bottom: 10px; }
        .table-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px; margin-top: 30px; }
        .table-card { height: 140px; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .table-card:hover { transform: scale(1.05); }
        .available { background-color: #2ecc71; } 
        .occupied { background-color: #e74c3c; }  
        .status-dot { width: 12px; height: 12px; border-radius: 50%; background-color: white; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="header">
        <h2>Hệ thống Phục vụ - Sơ đồ bàn ăn</h2>
        <div>Nhân viên: <strong style="color: #3498db;">Waiter Station</strong></div>
    </div>

    <div class="table-grid">
        {% for table in tables %}
        <div class="table-card {{ 'occupied' if table.Status == 'Occupied' else 'available' }}" 
             onclick="location.href='/waiter/order?table={{ table.TableNumber }}'">
            <span style="font-size: 20px;">Bàn {{ table.TableNumber }}</span>
            <small style="margin-top: 4px; opacity: 0.9;">{{ 'Đang dùng' if table.Status == 'Occupied' else 'Còn trống' }}</small>
            <div class="status-dot"></div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
