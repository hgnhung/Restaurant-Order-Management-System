<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Map - Waiter Station</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f6f9; margin: 0; padding: 25px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; }
        .header h2 { color: #2c3e50; margin: 0; font-size: 24px; }
        .staff-info { font-size: 16px; color: #4a5568; }
        .table-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 25px; margin-top: 30px; }
        .table-card { height: 150px; border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: all 0.2s ease; }
        .table-card:hover { transform: translateY(-4px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .available { background-color: #2ecc71; box-shadow: 0 4px 12px rgba(46, 204, 113, 0.2); } 
        .occupied { background-color: #e74c3c; box-shadow: 0 4px 12px rgba(231, 76, 60, 0.2); }  
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background-color: white; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <h2>Waiter System — Table Map</h2>
        <div class="staff-info">Staff: <strong style="color: #3498db;">{{ session.get('userID', 'Waiter Station') }}</strong></div>
    </div>
    <div class="table-grid">
        {% for table in tables %}
        <div class="table-card {{ 'occupied' if table.Status == 'Occupied' else 'available' }}" 
             onclick="location.href='{{ '/waiter/order-detail?table=' if table.Status == 'Occupied' else '/waiter/order?table=' }}{{ table.TableNumber }}'">
            <span style="font-size: 20px;">Table {{ table.TableNumber }}</span>
            <small style="margin-top: 4px; opacity: 0.9; font-weight: 500;">
                {{ 'Occupied' if table.Status == 'Occupied' else 'Available' }}
            </small>
            <div class="status-dot"></div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
