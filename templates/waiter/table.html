<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Table Map</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: #f1f5f9; 
            margin: 0; 
            padding: 40px; 
            color: #1e293b;
            min-height: 100vh;
        }
        
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: white;
            padding: 24px 32px;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            margin-bottom: 40px;
        }
        
        .header h2 { margin: 0; font-size: 26px; font-weight: 700; color: #0f172a; display: flex; align-items: center; gap: 12px; }
        
        .staff-badge { 
            background: #eff6ff; 
            color: #2563eb; 
            padding: 8px 16px; 
            border-radius: 20px; 
            font-weight: 600; 
            font-size: 15px; 
        }

        .btn-home {
            text-decoration: none;
            color: #64748b;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 12px;
            transition: all 0.2s;
        }
        .btn-home:hover { background: #f1f5f9; color: #0f172a; }

        .table-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 30px; 
        }
        
        .table-card { 
            position: relative;
            height: 180px; 
            border-radius: 24px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            background: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }
        
        .table-card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); 
        }
        
        .table-number {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            z-index: 2;
        }
        
        .table-status {
            font-size: 14px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 12px;
            z-index: 2;
        }

        /* Status: Available */
        .available .table-number { color: #0f172a; }
        .available .table-status { background: #ecfdf5; color: #059669; }
        .available::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 6px;
            background: #10b981;
        }

        /* Status: Occupied */
        .occupied .table-number { color: #0f172a; }
        .occupied .table-status { background: #fef2f2; color: #dc2626; }
        .occupied::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 6px;
            background: #ef4444;
        }
        
        /* Pulse dot for occupied tables */
        .pulse-dot {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 12px;
            height: 12px;
            background-color: #ef4444;
            border-radius: 50%;
        }
        .pulse-dot::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: inherit;
            border-radius: inherit;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(3); opacity: 0; }
        }

        /* Notification Toast styles */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 9999;
        }
        .toast {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-left: 5px solid #10b981;
            padding: 15px 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: #0f172a;
            font-weight: 500;
        }
        .toast-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            font-size: 13px;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>

    <div class="header">
        <h2>
            <a href="/waiter/dashboard" class="btn-home">⬅</a>
            Table Map
        </h2>
        <div class="staff-badge">
            👤 {{ session.get('userID', 'Waiter') }}
        </div>
    </div>
    
    <div class="table-grid">
        {% for table in tables %}
        <div class="table-card {{ 'occupied' if table.Status == 'Occupied' else 'available' }}" 
             onclick="location.href='{{ '/waiter/order-detail?table=' if table.Status == 'Occupied' else '/waiter/order?table=' }}{{ table.TableNumber }}'">
            {% if table.Status == 'Occupied' %}
                <div class="pulse-dot"></div>
            {% endif %}
            
            <div class="table-number">T-{{ table.TableNumber }}</div>
            <div class="table-status">
                {{ 'Occupied' if table.Status == 'Occupied' else 'Available' }}
            </div>
        </div>
        {% endfor %}
    </div>

    <script>
        // Polling notifications
        const knownNotifications = new Set();
        async function fetchNotifications() {
            try {
                const res = await fetch('/waiter/api/notifications');
                const data = await res.json();
                if (data.success && data.notifications) {
                    data.notifications.forEach(n => {
                        if (!knownNotifications.has(n.OrderID)) {
                            knownNotifications.add(n.OrderID);
                            showToast(n);
                        }
                    });
                }
            } catch (e) { console.error("Error fetching notifications", e); }
        }

        function showToast(notification) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `
                <div>
                    <strong>Order Ready!</strong><br>
                    <small>Table ${notification.TableNumber} is ready to be served.</small>
                </div>
                <a href="/waiter/order-detail?table=${notification.TableNumber}" class="toast-btn">Serve Now</a>
            `;
            container.appendChild(toast);
        }

        setInterval(fetchNotifications, 5000); // Check every 5 seconds
        fetchNotifications(); // Initial check
    </script>
</body>
</html>
